<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0c1a"/>
      <stop offset="100%" stop-color="#1a1230"/>
    </linearGradient>
    <linearGradient id="iconBg" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="700" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#e2d9f3"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="glowLine" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0"/>
      <stop offset="40%" stop-color="#7c3aed" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#a78bfa" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="frameClip">
      <rect x="30" y="53" width="100" height="73" rx="11"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <ellipse cx="600" cy="315" rx="520" ry="280" fill="url(#glow1)"/>

  <!-- Subtle grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#glowLine)"/>
  <!-- Bottom accent line -->
  <rect x="0" y="627" width="1200" height="3" fill="url(#glowLine)"/>

  <!-- === Large icon (scaled 3.3x from logo) === -->
  <!-- Icon background -->
  <rect x="100" y="195" width="160" height="160" rx="43" fill="url(#iconBg)"/>
  <!-- Gloss sheen -->
  <rect x="100" y="195" width="160" height="87" rx="43" fill="url(#shine)"/>
  <rect x="100" y="255" width="160" height="40" fill="url(#shine)"/>
  <!-- Photo frame -->
  <rect x="130" y="248" width="100" height="74" rx="12"
        fill="white" fill-opacity="0.07"
        stroke="white" stroke-opacity="0.28" stroke-width="5"/>
  <!-- Landscape inside photo frame -->
  <g clip-path="url(#frameClip)">
    <rect x="30" y="53" width="100" height="73" fill="#1e1b4b" fill-opacity="0.55" transform="translate(100,195)"/>
    <polygon points="130,322 170,271 210,322" fill="#4c1d95" fill-opacity="0.78"/>
    <polygon points="163,322 196,284 230,322" fill="#5b21b6" fill-opacity="0.65"/>
    <circle cx="218" cy="261" r="12" fill="#fbbf24" fill-opacity="0.88"/>
  </g>
  <!-- Sparkle top-right -->
  <g transform="translate(245, 222)">
    <line x1="0" y1="-17" x2="0" y2="17" stroke="#e9d5ff" stroke-width="6.3" stroke-linecap="round"/>
    <line x1="-17" y1="0" x2="17" y2="0" stroke="#e9d5ff" stroke-width="6.3" stroke-linecap="round"/>
    <line x1="-10.5" y1="-10.5" x2="10.5" y2="10.5" stroke="#c4b5fd" stroke-width="3" stroke-linecap="round" stroke-opacity="0.55"/>
    <line x1="10.5" y1="-10.5" x2="-10.5" y2="10.5" stroke="#c4b5fd" stroke-width="3" stroke-linecap="round" stroke-opacity="0.55"/>
  </g>
  <circle cx="258" cy="239" r="4.3" fill="white" fill-opacity="0.5"/>
  <!-- Slider bar -->
  <rect x="130" y="336" width="100" height="7.3" rx="3.7" fill="white" fill-opacity="0.13"/>
  <rect x="130" y="336" width="66" height="7.3" rx="3.7" fill="white" fill-opacity="0.52"/>
  <circle cx="196" cy="339.6" r="10" fill="white" fill-opacity="0.95"/>

  <!-- === Wordmark === -->
  <text
    x="310" y="305"
    font-family="'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="110"
    font-weight="700"
    letter-spacing="-4"
    fill="url(#textGrad)"
  >enhancr</text>

  <!-- Tagline -->
  <text
    x="312" y="362"
    font-family="'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="28"
    font-weight="400"
    letter-spacing="0.2"
    fill="#a78bfa"
    fill-opacity="0.85"
  >Browser-based image editor. No uploads. No server.</text>

  <!-- Decorative corner sparkles -->
  <g transform="translate(60, 570)" opacity="0.35">
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#a78bfa" stroke-width="2" stroke-linecap="round"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#a78bfa" stroke-width="2" stroke-linecap="round"/>
  </g>
  <g transform="translate(1140, 60)" opacity="0.35">
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#a78bfa" stroke-width="2" stroke-linecap="round"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#a78bfa" stroke-width="2" stroke-linecap="round"/>
  </g>
  <circle cx="1140" cy="570" r="3" fill="#7c3aed" fill-opacity="0.4"/>
  <circle cx="60" cy="60" r="3" fill="#7c3aed" fill-opacity="0.4"/>

  <!-- Feature pills -->
  <g transform="translate(312, 400)">
    <!-- Pill 1 -->
    <rect x="0" y="0" width="148" height="40" rx="20" fill="#7c3aed" fill-opacity="0.18" stroke="#7c3aed" stroke-opacity="0.4" stroke-width="1"/>
    <text x="74" y="26" font-family="'Inter', -apple-system, sans-serif" font-size="16" font-weight="500" fill="#c4b5fd" text-anchor="middle">Filters &amp; Adjust</text>
    <!-- Pill 2 -->
    <rect x="164" y="0" width="108" height="40" rx="20" fill="#7c3aed" fill-opacity="0.18" stroke="#7c3aed" stroke-opacity="0.4" stroke-width="1"/>
    <text x="218" y="26" font-family="'Inter', -apple-system, sans-serif" font-size="16" font-weight="500" fill="#c4b5fd" text-anchor="middle">Crop &amp; Flip</text>
    <!-- Pill 3 -->
    <rect x="288" y="0" width="90" height="40" rx="20" fill="#7c3aed" fill-opacity="0.18" stroke="#7c3aed" stroke-opacity="0.4" stroke-width="1"/>
    <text x="333" y="26" font-family="'Inter', -apple-system, sans-serif" font-size="16" font-weight="500" fill="#c4b5fd" text-anchor="middle">Resize</text>
    <!-- Pill 4 -->
    <rect x="394" y="0" width="106" height="40" rx="20" fill="#7c3aed" fill-opacity="0.18" stroke="#7c3aed" stroke-opacity="0.4" stroke-width="1"/>
    <text x="447" y="26" font-family="'Inter', -apple-system, sans-serif" font-size="16" font-weight="500" fill="#c4b5fd" text-anchor="middle">Web Worker</text>
  </g>
</svg>
